name: glibc-compat

on:
  push:
    branches: [main]
  pull_request:

jobs:
  glibc-compat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder image (linux/amd64)
        run: |
          docker buildx build --platform linux/amd64 --target builder --load -t trueid-builder:glibc236 .

      - name: Verify max required GLIBC <= 2.36
        run: |
          docker run --rm --entrypoint /bin/sh trueid-builder:glibc236 -c '
            set -eu
            max_glibc="$(strings /out/trueid-engine | grep -o "GLIBC_[0-9.]\+" | sort -Vu | tail -n 1)"
            echo "max_glibc=${max_glibc}"
            [ -n "${max_glibc}" ]
            max_ver="${max_glibc#GLIBC_}"
            dpkg --compare-versions "${max_ver}" le "2.36"
          '

      - name: Build runtime image (linux/amd64)
        run: |
          docker buildx build --platform linux/amd64 --target runtime --load -t trueid-runtime:glibc236 .

      - name: Runtime image metadata
        run: |
          cid="$(docker create trueid-runtime:glibc236)"
          cleanup() {
            docker rm -f "${cid}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker image inspect trueid-runtime:glibc236 --format 'user={{.Config.User}} cmd={{json .Config.Cmd}}'
          docker cp "${cid}:/usr/local/bin/trueid-engine" "${RUNNER_TEMP}/trueid-engine"
          docker cp "${cid}:/usr/local/bin/trueid-probe" "${RUNNER_TEMP}/trueid-probe"
          docker cp "${cid}:/app/migrations" "${RUNNER_TEMP}/migrations"

          test -x "${RUNNER_TEMP}/trueid-engine"
          test -x "${RUNNER_TEMP}/trueid-probe"
          find "${RUNNER_TEMP}/migrations" -type f | grep -q .

      - name: Binary ldd inspection
        run: |
          docker run --rm --entrypoint /bin/sh trueid-builder:glibc236 -c '
            set -eu
            ldd /out/trueid-engine
            ldd /out/trueid
            ldd /out/trueid-web
            ldd /out/trueid-probe
          '

      - name: Smoke test trueid-engine
        run: |
          tmpdir="$(mktemp -d)"
          cid="$(docker run -d --rm \
            -v "${tmpdir}:/app/data" \
            -e DATABASE_URL=sqlite:///app/data/net-identity.db?mode=rwc \
            -e RUST_LOG=info \
            -e RADIUS_SECRET=glibc-compat-secret \
            -e RADIUS_BIND=0.0.0.0:1813 \
            -e AD_SYSLOG_BIND=0.0.0.0:5514 \
            -e DHCP_SYSLOG_BIND=0.0.0.0:5516 \
            -e ADMIN_HTTP_BIND=0.0.0.0:9090 \
            trueid-runtime:glibc236 /usr/local/bin/trueid-engine)"
          cleanup() {
            docker rm -f "${cid}" >/dev/null 2>&1 || true
            rm -rf "${tmpdir}"
          }
          trap cleanup EXIT

          ready=0
          for _ in $(seq 1 20); do
            if docker exec "${cid}" /usr/local/bin/trueid-probe tcp 127.0.0.1:9090 >/dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 1
          done

          [ "${ready}" = "1" ]
          test -s "${tmpdir}/net-identity.db"
          docker logs "${cid}" | grep -q "Initializing database"
