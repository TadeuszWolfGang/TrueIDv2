<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TrueID — Login</title>
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <canvas id="matrix-bg"></canvas>
    <div class="login-card">
      <div class="lock-icon"></div>
      <h1 class="csp-static-001">
        ▸ TRUE<span class="csp-static-002">ID</span>
      </h1>
      <p class="csp-static-003">
        IDENTITY CORRELATION ENGINE
      </p>

      <div id="error-msg" class="error-msg" hidden></div>

      <div id="oidc-section" hidden>
        <a href="/api/auth/oidc/login" class="btn btn-oidc csp-static-004">
          ▸ Sign in with <span id="oidc-provider-name">OIDC</span>
        </a>
        <div id="oidc-local-divider" class="csp-static-005">— or sign in locally —</div>
      </div>


      <form id="login-form" autocomplete="on">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />

        <div id="totp-wrap" hidden>
          <label for="totp-code">2FA code</label>
          <input type="text" id="totp-code" name="totp-code" inputmode="numeric" autocomplete="one-time-code" placeholder="123456 or backup code" />
        </div>

        <button type="submit" class="btn" id="login-btn">Log in</button>
      </form>


      <div id="change-pw" class="change-pw-section" hidden>
        <h2>Password change required</h2>
        <p>Your account requires a new password before continuing.</p>

        <label for="new-password">New password</label>
        <input type="password" id="new-password" autocomplete="new-password" />

        <label for="confirm-password">Confirm password</label>
        <input type="password" id="confirm-password" autocomplete="new-password" />

        <button type="button" class="btn" id="change-pw-btn">
          Change password
        </button>
      </div>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
