# TrueID reverse proxy configuration
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/

upstream trueid_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name trueid.example.com;

    ssl_certificate     /etc/ssl/certs/trueid.pem;
    ssl_certificate_key /etc/ssl/private/trueid-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # WebSocket-ready proxy
    location / {
        proxy_pass http://trueid_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # Prometheus metrics (optional: restrict to monitoring network)
    location /metrics {
        proxy_pass http://trueid_web/metrics;
        # allow 10.0.0.0/8;
        # deny all;
    }

    # Health check (no logging)
    location /health {
        proxy_pass http://trueid_web/health;
        access_log off;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name trueid.example.com;
    return 301 https://$host$request_uri;
}
