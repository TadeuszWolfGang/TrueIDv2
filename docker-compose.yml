services:
  engine:
    build: .
    command: trueid-engine
    working_dir: /app
    ports:
      - "1813:1813/udp"
      - "5514:5514/udp"
      - "5516:5516/udp"
      # SECURITY: engine admin API (:8080) must NEVER be exposed outside Docker network.
      # It is accessible only via trueid-web proxy which adds authentication.
      # ports: do NOT add 8080 mapping here
    volumes:
      - ./data:/app/data
    environment:
      DATABASE_URL: "sqlite:///app/data/net-identity.db?mode=rwc"
      RADIUS_BIND: "0.0.0.0:1813"
      AD_SYSLOG_BIND: "0.0.0.0:5514"
      DHCP_SYSLOG_BIND: "0.0.0.0:5516"
      ADMIN_HTTP_BIND: "0.0.0.0:8080"
      ENGINE_SERVICE_TOKEN: "${ENGINE_SERVICE_TOKEN:-}"
      RUST_LOG: info
    restart: unless-stopped

  web:
    build: .
    command: trueid-web
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./apps/web/assets:/app/assets
    environment:
      DATABASE_URL: "sqlite:///app/data/net-identity.db?mode=rwc"
      HTTP_BIND: "0.0.0.0:3000"
      ASSETS_DIR: "/app/assets"
      ENGINE_API_URL: "http://engine:8080"
      ENGINE_SERVICE_TOKEN: "${ENGINE_SERVICE_TOKEN:-}"
      JWT_SECRET: "${JWT_SECRET:-}"
      CONFIG_ENCRYPTION_KEY: "${CONFIG_ENCRYPTION_KEY:-}"
      ARGON2_PEPPER: "${ARGON2_PEPPER:-}"
      TRUEID_ADMIN_USER: "${TRUEID_ADMIN_USER:-admin}"
      TRUEID_ADMIN_PASS: "${TRUEID_ADMIN_PASS:-}"
      TRUEID_DEV_MODE: "${TRUEID_DEV_MODE:-false}"
      RUST_LOG: info
    depends_on:
      - engine
    restart: unless-stopped
