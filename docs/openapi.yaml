openapi: 3.1.0
info:
  title: TrueID API
  description: Real-time Identity Correlation Engine
  version: 0.8.0
  license:
    name: Proprietary
servers:
  - url: http://localhost:3000
    description: Local development
tags:
  - name: auth
    description: Authentication & session management
  - name: mappings
    description: IP↔User↔MAC identity mappings
  - name: search
    description: Universal search across mappings & events
  - name: conflicts
    description: Identity conflict detection & resolution
  - name: alerts
    description: Alert rules & history
  - name: subnets
    description: Subnet definitions & auto-tagging
  - name: switches
    description: SNMP switch management & port mapping
  - name: fingerprints
    description: DHCP fingerprint database & observations
  - name: dns
    description: Reverse DNS cache
  - name: timeline
    description: IP/User/MAC activity timeline
  - name: firewall
    description: Firewall User-ID push targets
  - name: siem
    description: SIEM event forwarding targets
  - name: ldap
    description: LDAP group sync configuration
  - name: admin
    description: User management, API keys, audit
  - name: system
    description: Health, metrics, adapters

paths:
  /api/auth/login:
    post:
      tags: [auth]
      summary: Login
      description: Authenticates user and sets session cookies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/auth/logout:
    post:
      tags: [auth]
      summary: Logout
      description: Invalidates current session.
      security:
        - cookieAuth: []
          csrfToken: []
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/auth/logout-all:
    post:
      tags: [auth]
      summary: Logout all sessions
      description: Invalidates all active sessions for current user.
      security:
        - cookieAuth: []
          csrfToken: []
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/auth/me:
    get:
      tags: [auth]
      summary: Current user info
      security:
        - cookieAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh access token
      security:
        - cookieAuth: []
          csrfToken: []
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/auth/sessions:
    get:
      tags: [auth]
      summary: List active sessions
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Sessions list
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Session'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/auth/sessions/{id}:
    delete:
      tags: [auth]
      summary: Revoke specific session
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/auth/change-password:
    post:
      tags: [auth]
      summary: Change password
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/mappings:
    get:
      tags: [mappings]
      summary: List mappings
      description: Paginates identity mappings with filters and sorting.
      security:
        - cookieAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Source'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Active'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: Paginated mappings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MappingsPage'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/mappings/{ip}:
    delete:
      tags: [mappings]
      summary: Delete mapping by IP
      security:
        - cookieAuth: []
          csrfToken: []
        - apiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Ip'
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/events:
    post:
      tags: [mappings]
      summary: Submit manual mapping event
      security:
        - cookieAuth: []
          csrfToken: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualEventRequest'
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/stats:
    get:
      tags: [system]
      summary: Global stats
      security:
        - cookieAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Engine stats
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/users:
    get:
      tags: [admin]
      summary: List users
      security:
        - cookieAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      tags: [admin]
      summary: Create user
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/users/{id}:
    get:
      tags: [admin]
      summary: Get user
      security:
        - cookieAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      tags: [admin]
      summary: Delete user
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/users/{id}/role:
    put:
      tags: [admin]
      summary: Change role
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: '#/components/schemas/UserRole'
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/users/{id}/reset-password:
    post:
      tags: [admin]
      summary: Reset password
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/users/{id}/unlock:
    post:
      tags: [admin]
      summary: Unlock account
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/api-keys:
    get:
      tags: [admin]
      summary: List API keys
      security:
        - cookieAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiKey'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      tags: [admin]
      summary: Create API key
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '200':
          description: API key created (raw key visible once)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiKey'
                  - type: object
                    properties:
                      key:
                        type: string
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/api-keys/{id}:
    delete:
      tags: [admin]
      summary: Revoke API key
      security:
        - cookieAuth: []
          csrfToken: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/audit-logs:
    get:
      tags: [admin]
      summary: List audit logs
      security:
        - cookieAuth: []
        - apiKeyAuth: []
      parameters:
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: username
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEntry'
                  total:
                    type: integer
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/audit-logs/stats:
    get:
      tags: [admin]
      summary: Audit stats
      security:
        - cookieAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Audit stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: { type: integer }
                  last_24h: { type: integer }
                  last_7d: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/admin/adapters:
    get:
      tags: [system]
      summary: Adapter status
      security:
        - cookieAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Adapter status list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/admin/runtime-config:
    get:
      tags: [system]
      summary: Runtime environment config
      security:
        - cookieAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Runtime config
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/admin/config/ttl:
    get:
      tags: [system]
      summary: Get TTL config
      security:
        - cookieAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: TTL configuration
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
    put:
      tags: [system]
      summary: Update TTL config
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/admin/config/source-priority:
    get:
      tags: [system]
      summary: Get source priority config
      security:
        - cookieAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Source priority configuration
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
    put:
      tags: [system]
      summary: Update source priority config
      security:
        - cookieAuth: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v2/search:
    get:
      tags: [search]
      summary: Universal search
      security:
        - cookieAuth: []
        - apiKeyAuth: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: ip
          schema: { type: string }
        - in: query
          name: user
          schema: { type: string }
        - in: query
          name: mac
          schema: { type: string }
        - in: query
          name: vendor
          schema: { type: string }
        - in: query
          name: source
          schema: { type: string }
        - in: query
          name: scope
          schema: { type: string, enum: [all, mappings, events] }
        - in: query
          name: active
          schema: { type: boolean }
        - $ref: '#/components/parameters/TimelineFrom'
        - $ref: '#/components/parameters/TimelineTo'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Page'
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        '200':
          description: Search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v2/export/mappings:
    get:
      tags: [search]
      summary: Export mappings
      security:
        - cookieAuth: []
        - apiKeyAuth: []
      parameters:
        - in: query
          name: format
          schema: { type: string, enum: [json, csv], default: json }
        - in: query
          name: ip
          schema: { type: string }
        - in: query
          name: user
          schema: { type: string }
        - in: query
          name: mac
          schema: { type: string }
        - in: query
          name: vendor
          schema: { type: string }
        - in: query
          name: source
          schema: { type: string }
        - in: query
          name: active
          schema: { type: boolean }
        - $ref: '#/components/parameters/TimelineFrom'
        - $ref: '#/components/parameters/TimelineTo'
      responses:
        '200':
          description: Export data
          headers:
            Content-Disposition:
              description: Attachment filename ending with `.json` or `.csv`.
              schema: { type: string }
            x-trueid-truncated:
              description: Present with value `true` when the export hits the server-side row cap.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DeviceMapping' }
            text/csv:
              schema:
                type: string
                description: >
                  RFC4180 CSV. The `user` column contains the first active user for the mapping,
                  while `current_users` contains all active users joined with semicolons.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v2/export/events:
    get:
      tags: [search]
      summary: Export events
      security:
        - cookieAuth: []
        - apiKeyAuth: []
      parameters:
        - in: query
          name: format
          schema: { type: string, enum: [json, csv], default: json }
        - in: query
          name: ip
          schema: { type: string }
        - in: query
          name: user
          schema: { type: string }
        - in: query
          name: source
          schema: { type: string }
        - $ref: '#/components/parameters/TimelineFrom'
        - $ref: '#/components/parameters/TimelineTo'
      responses:
        '200':
          description: Export data
          headers:
            Content-Disposition:
              description: Attachment filename ending with `.json` or `.csv`.
              schema: { type: string }
            x-trueid-truncated:
              description: Present with value `true` when the export hits the server-side row cap.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/StoredEvent' }
            text/csv:
              schema:
                type: string
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

