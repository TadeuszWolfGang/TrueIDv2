components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: trueid_access_token
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    metricsToken:
      type: apiKey
      in: query
      name: token
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema: { type: integer }
    SessionId:
      in: path
      name: id
      required: true
      schema: { type: string }
    Ip:
      in: path
      name: ip
      required: true
      schema: { type: string }
    Mac:
      in: path
      name: mac
      required: true
      schema: { type: string }
    TimelineFrom:
      in: query
      name: from
      description: >
        Lower bound timestamp. Runtime accepts RFC3339, `YYYY-MM-DDTHH:MM:SS`,
        and `YYYY-MM-DD HH:MM:SS`.
      schema: { type: string }
    TimelineTo:
      in: query
      name: to
      description: >
        Upper bound timestamp. Runtime accepts RFC3339, `YYYY-MM-DDTHH:MM:SS`,
        and `YYYY-MM-DD HH:MM:SS`.
      schema: { type: string }
    TimelineCursor:
      in: query
      name: cursor
      description: Opaque cursor returned by the previous timeline page.
      schema: { type: string }
    TimelineLimit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
    Source:
      in: query
      name: source
      schema: { type: string }
    Search:
      in: query
      name: search
      schema: { type: string }
    Active:
      in: query
      name: active
      schema: { type: boolean }
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
    PerPage:
      in: query
      name: per_page
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    Sort:
      in: query
      name: sort
      schema: { type: string }
    Order:
      in: query
      name: order
      schema: { type: string, enum: [asc, desc], default: desc }
  responses:
    OkMessage:
      description: Operation successful
      content:
        application/json:
          schema:
            type: object
            properties:
              ok: { type: boolean, example: true }
              message: { type: string }
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Authentication required or invalid
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ConflictError:
      description: Conflict with current state
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    ErrorResponse:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        request_id: { type: string, nullable: true }
    UserRole:
      type: string
      enum: [Admin, Operator, Viewer]
    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        role: { $ref: '#/components/schemas/UserRole' }
        created_at: { type: string, format: date-time, nullable: true }
        locked_at: { type: string, format: date-time, nullable: true }
    Session:
      type: object
      properties:
        id: { type: string }
        created_at: { type: string, format: date-time, nullable: true }
        last_seen_at: { type: string, format: date-time, nullable: true }
        ip: { type: string, nullable: true }
        user_agent: { type: string, nullable: true }
    ApiKey:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        role: { $ref: '#/components/schemas/UserRole' }
        prefix: { type: string }
        created_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        last_used_at: { type: string, format: date-time, nullable: true }
    MappingTag:
      type: object
      properties:
        tag: { type: string }
        color: { type: string }
    DeviceMapping:
      type: object
      properties:
        ip: { type: string }
        mac: { type: string, nullable: true }
        current_users:
          type: array
          description: Active users observed for this IP from `ip_sessions` aggregation.
          items: { type: string }
        last_seen: { type: string, format: date-time }
        source: { type: string }
        confidence_score:
          type: integer
          minimum: 0
          maximum: 100
        is_active: { type: boolean }
        vendor: { type: string, nullable: true }
        subnet_id: { type: integer, nullable: true }
        subnet_name: { type: string, nullable: true }
        hostname: { type: string, nullable: true }
        device_type: { type: string, nullable: true }
        multi_user: { type: boolean }
        groups:
          type: array
          nullable: true
          items: { type: string }
        country_code: { type: string, nullable: true }
        city: { type: string, nullable: true }
        tags:
          type: array
          items: { $ref: '#/components/schemas/MappingTag' }
    StoredEvent:
      type: object
      properties:
        id: { type: integer }
        ip: { type: string }
        user: { type: string }
        source: { type: string }
        timestamp: { type: string, format: date-time }
        raw_data: { type: string }
    MappingsPage:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/DeviceMapping' }
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
    Conflict:
      type: object
      properties:
        id: { type: integer }
        conflict_type:
          type: string
          description: Response field name for the conflict category. Query filtering uses the `type` parameter alias.
        severity: { type: string }
        ip: { type: string, nullable: true }
        mac: { type: string, nullable: true }
        user_old: { type: string, nullable: true }
        user_new: { type: string, nullable: true }
        source: { type: string }
        details: { type: string, nullable: true }
        detected_at: { type: string, format: date-time }
        resolved_at: { type: string, format: date-time, nullable: true }
        resolved_by: { type: string, nullable: true }
    StringCountMap:
      type: object
      additionalProperties: { type: integer }
    ConflictStatsResponse:
      type: object
      properties:
        total_unresolved: { type: integer }
        by_type: { $ref: '#/components/schemas/StringCountMap' }
        by_severity: { $ref: '#/components/schemas/StringCountMap' }
    PaginatedMeta:
      type: object
      properties:
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        total_pages: { type: integer }
        next_cursor: { type: string, nullable: true }
    PaginatedConflictResponse:
      allOf:
        - $ref: '#/components/schemas/PaginatedMeta'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Conflict' }
    RuleChannelInfo:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        channel_type: { type: string }
    AlertRuleRecord:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        enabled: { type: boolean }
        rule_type:
          type: string
          description: Supported values are new_mac, ip_conflict, user_change, new_subnet, and source_down.
        severity: { type: string }
        conditions:
          type: string
          nullable: true
          description: |
            JSON-encoded condition payload stored verbatim in the database.
            For source_down rules, this must be a JSON object like
            {"source":"AD TLS","silence_seconds":300}, where source is one of
            RADIUS, AD Syslog, DHCP Syslog, VPN Syslog, AD TLS, DHCP TLS and
            silence_seconds defaults to 300 and must stay within 60..=3600.
        action_webhook_url: { type: string, nullable: true }
        action_webhook_headers:
          type: string
          nullable: true
          description: JSON-encoded extra webhook headers stored verbatim in the database.
        action_log: { type: boolean }
        cooldown_seconds: { type: integer }
        channels:
          type: array
          items: { $ref: '#/components/schemas/RuleChannelInfo' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateAlertRuleRequest:
      type: object
      required: [name, rule_type, severity, action_log, cooldown_seconds]
      properties:
        name: { type: string }
        rule_type:
          type: string
          description: Supported values are new_mac, ip_conflict, user_change, new_subnet, and source_down.
        severity: { type: string }
        conditions:
          type: string
          nullable: true
          description: |
            Optional JSON-encoded condition payload.
            For source_down rules, this field is required and must be a JSON
            object like {"source":"AD TLS","silence_seconds":300}. The
            silence_seconds field is optional and defaults to 300.
        action_webhook_url: { type: string, nullable: true }
        action_webhook_headers: { type: string, nullable: true }
        action_log: { type: boolean }
        cooldown_seconds: { type: integer }
        channel_ids:
          type: array
          nullable: true
          items: { type: integer }
    UpdateAlertRuleRequest:
      type: object
      properties:
        name: { type: string }
        enabled: { type: boolean }
        rule_type:
          type: string
          description: Supported values are new_mac, ip_conflict, user_change, new_subnet, and source_down.
        severity: { type: string }
        conditions:
          type: string
          nullable: true
          description: |
            Optional JSON-encoded condition payload.
            For source_down rules, the effective conditions must be a valid JSON
            object like {"source":"AD TLS","silence_seconds":300}.
        action_webhook_url: { type: string, nullable: true }
        action_webhook_headers: { type: string, nullable: true }
        action_log: { type: boolean }
        cooldown_seconds: { type: integer }
        channel_ids:
          type: array
          nullable: true
          items: { type: integer }
    AlertRulesResponse:
      type: object
      properties:
        rules:
          type: array
          items: { $ref: '#/components/schemas/AlertRuleRecord' }
    AlertFiring:
      type: object
      properties:
        id: { type: integer }
        rule_id: { type: integer }
        rule_name: { type: string }
        rule_type: { type: string }
        severity: { type: string }
        ip: { type: string, nullable: true }
        mac: { type: string, nullable: true }
        user_name: { type: string, nullable: true }
        source: { type: string, nullable: true }
        details: { type: string, nullable: true }
        webhook_status: { type: string, nullable: true }
        webhook_response: { type: string, nullable: true }
        fired_at: { type: string, format: date-time }
    PaginatedAlertHistoryResponse:
      allOf:
        - $ref: '#/components/schemas/PaginatedMeta'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/AlertFiring' }
    AlertStatsResponse:
      type: object
      properties:
        total_rules: { type: integer }
        enabled_rules: { type: integer }
        total_fired_24h: { type: integer }
        by_severity_24h: { $ref: '#/components/schemas/StringCountMap' }
        by_type_24h: { $ref: '#/components/schemas/StringCountMap' }
        webhook_success_rate_24h: { type: number, format: double }
    CurrentIpMapping:
      type: object
      properties:
        user: { type: string }
        mac: { type: string, nullable: true }
        source: { type: string }
        last_seen: { type: string, format: date-time }
        confidence: { type: integer }
        is_active: { type: boolean }
        vendor: { type: string, nullable: true }
    IpTimelineEvent:
      type: object
      properties:
        id: { type: integer }
        user: { type: string }
        source: { type: string }
        timestamp: { type: string, format: date-time }
    UserChange:
      type: object
      properties:
        from_user: { type: string }
        to_user: { type: string }
        changed_at: { type: string, format: date-time }
        source: { type: string }
    PaginatedIpTimelineEvents:
      allOf:
        - $ref: '#/components/schemas/PaginatedMeta'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/IpTimelineEvent' }
    IpTimelineResponse:
      type: object
      properties:
        ip: { type: string }
        current_mapping:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CurrentIpMapping'
        events:
          $ref: '#/components/schemas/PaginatedIpTimelineEvents'
        user_changes:
          type: array
          items: { $ref: '#/components/schemas/UserChange' }
        conflicts_count: { type: integer }
    UserActiveMapping:
      type: object
      properties:
        ip: { type: string }
        mac: { type: string, nullable: true }
        source: { type: string }
        last_seen: { type: string, format: date-time }
        vendor: { type: string, nullable: true }
    UserTimelineEvent:
      type: object
      properties:
        id: { type: integer }
        ip: { type: string }
        source: { type: string }
        timestamp: { type: string, format: date-time }
    PaginatedUserTimelineEvents:
      allOf:
        - $ref: '#/components/schemas/PaginatedMeta'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/UserTimelineEvent' }
    UserTimelineResponse:
      type: object
      properties:
        user: { type: string }
        active_mappings:
          type: array
          items: { $ref: '#/components/schemas/UserActiveMapping' }
        events:
          $ref: '#/components/schemas/PaginatedUserTimelineEvents'
        ip_addresses_used:
          type: array
          items: { type: string }
    MacCurrentMapping:
      type: object
      properties:
        ip: { type: string }
        user: { type: string }
        source: { type: string }
        last_seen: { type: string, format: date-time }
        is_active: { type: boolean }
    MacTimelineResponse:
      type: object
      properties:
        mac: { type: string }
        current_mappings:
          type: array
          items: { $ref: '#/components/schemas/MacCurrentMapping' }
        current_mappings_total: { type: integer }
        current_mappings_page: { type: integer }
        current_mappings_limit: { type: integer }
        current_mappings_next_cursor: { type: string, nullable: true }
        ip_history:
          type: array
          items: { type: string }
        ip_history_truncated: { type: boolean }
    Subnet:
      type: object
      properties:
        id: { type: integer, nullable: true }
        cidr: { type: string }
        name: { type: string }
        vlan_id: { type: integer, nullable: true }
        location: { type: string, nullable: true }
        description: { type: string, nullable: true }
        gateway: { type: string, nullable: true }
    Switch:
      type: object
      properties:
        id: { type: integer, nullable: true }
        name: { type: string }
        ip: { type: string }
        snmp_version: { type: string, nullable: true }
        port: { type: integer, nullable: true }
        poll_interval_secs: { type: integer, nullable: true }
        enabled: { type: boolean }
        last_poll_at: { type: string, format: date-time, nullable: true }
        last_poll_status: { type: string, nullable: true }
    SwitchCreateRequest:
      type: object
      required: [ip, name, community]
      properties:
        ip: { type: string }
        name: { type: string }
        community: { type: string }
        snmp_version: { type: string, nullable: true }
        port: { type: integer, nullable: true }
        poll_interval_secs: { type: integer, nullable: true }
        enabled: { type: boolean, default: true }
        subnet_id: { type: integer, nullable: true }
        location: { type: string, nullable: true }
    FirewallTarget:
      type: object
      properties:
        id: { type: integer, nullable: true }
        name: { type: string }
        firewall_type: { type: string, enum: [panos, fortigate] }
        host: { type: string }
        port: { type: integer }
        username: { type: string, nullable: true }
        verify_tls: { type: boolean }
        push_interval_secs: { type: integer }
        enabled: { type: boolean }
        subnet_filter: { type: string, nullable: true }
        last_push_at: { type: string, format: date-time, nullable: true }
        last_push_status: { type: string, nullable: true }
    SiemTarget:
      type: object
      properties:
        id: { type: integer, nullable: true }
        name: { type: string }
        format: { type: string, enum: [cef, leef, json] }
        transport: { type: string, enum: [udp, tcp] }
        host: { type: string }
        port: { type: integer }
        forward_mappings: { type: boolean }
        forward_conflicts: { type: boolean }
        forward_alerts: { type: boolean }
        enabled: { type: boolean }
    LdapConfig:
      type: object
      properties:
        enabled: { type: boolean }
        ldap_url: { type: string, nullable: true }
        bind_dn: { type: string, nullable: true }
        password_set: { type: boolean }
        search_base: { type: string, nullable: true }
        search_filter: { type: string, nullable: true }
        sync_interval_secs: { type: integer, nullable: true }
    LdapConfigUpdateRequest:
      type: object
      properties:
        enabled: { type: boolean }
        ldap_url: { type: string }
        bind_dn: { type: string }
        bind_password: { type: string, nullable: true }
        search_base: { type: string }
        search_filter: { type: string }
        sync_interval_secs: { type: integer }
    AuditEntry:
      type: object
      properties:
        id: { type: integer }
        timestamp: { type: string, format: date-time }
        user_id: { type: integer, nullable: true }
        username: { type: string, nullable: true }
        principal_type: { type: string, nullable: true }
        action: { type: string }
        target: { type: string, nullable: true }
        details: { type: string, nullable: true }
        ip_address: { type: string, nullable: true }
        request_id: { type: string, nullable: true }
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        force_password_change: { type: boolean }
        active_sessions_count: { type: integer }
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password: { type: string }
        new_password: { type: string }
    CreateUserRequest:
      type: object
      required: [username, password, role]
      properties:
        username: { type: string }
        password: { type: string }
        role: { $ref: '#/components/schemas/UserRole' }
    CreateApiKeyRequest:
      type: object
      required: [name, role]
      properties:
        name: { type: string }
        role: { $ref: '#/components/schemas/UserRole' }
        expires_at: { type: string, format: date-time, nullable: true }
    ManualEventRequest:
      type: object
      required: [ip, user]
      properties:
        ip: { type: string }
        user: { type: string }
        mac: { type: string, nullable: true }
        source: { type: string, nullable: true }
    SearchSectionDeviceMapping:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/DeviceMapping' }
        total: { type: integer }
    SearchSectionStoredEvent:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/StoredEvent' }
        total: { type: integer }
    SearchResponse:
      type: object
      properties:
        mappings:
          description: Null when the requested scope excludes mappings, for example `scope=events`.
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SearchSectionDeviceMapping'
        events:
          description: Null when the requested scope excludes events, for example `scope=mappings`.
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SearchSectionStoredEvent'
        page: { type: integer }
        limit: { type: integer }
        query_time_ms: { type: integer }
